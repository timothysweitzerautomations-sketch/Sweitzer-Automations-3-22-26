name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# GitHub is moving Actions’ JS runtime from Node 20 → 24 (see changelog). Opt in so
# checkout/setup-* actions run on Node 24 and deprecation annotations stay quiet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest
        run: pytest tests/ -q
      - name: build_crew smoke test
        run: python -c "from main import build_crew; c = build_crew(); print('tasks:', len(c.tasks))"

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - name: Android SDK
        uses: android-actions/setup-android@v3
      - name: assembleDebug
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

  xcode:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (macOS)
        working-directory: apple/SweitzerAutomations
        run: |
          xcodebuild -project SweitzerAutomations.xcodeproj \
            -scheme SweitzerAutomations \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  windows_exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: python -m pip install -r windows_app/requirements-build.txt
      - name: PyInstaller
        run: >
          pyinstaller --noconfirm --onefile --windowed --name SweitzerAutomations-3-22-26
          --paths .
          --add-data "revenue_pulse;revenue_pulse"
          --hidden-import=revenue_pulse
          --hidden-import=revenue_pulse.revenue_engine
          --hidden-import=revenue_pulse.flip_engine
          --icon windows/icon.ico
          windows_app/launcher.py
      - name: List dist
        run: dir dist

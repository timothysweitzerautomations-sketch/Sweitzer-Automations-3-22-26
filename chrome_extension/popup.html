<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sweitzer Automations</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        font-family: system-ui, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        background: #0c1117;
        color: #e8edf5;
      }
      h1 {
        font-size: 14px;
        font-weight: 650;
        margin: 0 0 6px;
      }
      p {
        margin: 0 0 12px;
        color: #8b9bb5;
        line-height: 1.45;
        font-size: 12px;
      }
      button {
        display: block;
        width: 100%;
        margin-bottom: 8px;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button.primary {
        background: #3b82f6;
        color: #fff;
      }
      button.secondary {
        background: #151c24;
        color: #e8edf5;
        border: 1px solid #243044;
      }
      button:hover {
        filter: brightness(1.08);
      }
      a.link {
        display: block;
        margin-top: 10px;
        color: #60a5fa;
        font-size: 12px;
        text-decoration: none;
      }
      a.link:hover {
        text-decoration: underline;
      }
      .warn {
        font-size: 11px;
        color: #f59e0b;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Sweitzer Automations</h1>
    <p>Opens your local dashboards. Start the server from the repo first (see CHROME.md).</p>
    <button type="button" class="primary" id="btnRevenue">Revenue Pulse</button>
    <button type="button" class="secondary" id="btnFlip">Flip profit tracker</button>
    <a class="link" href="#" id="linkOptions">Port &amp; settings…</a>
    <p class="warn" id="msg"></p>
    <script src="popup.js"></script>
  </body>
</html>

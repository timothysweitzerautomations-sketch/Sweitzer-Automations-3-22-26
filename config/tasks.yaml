tasks:
  - id: find_prices
    agent_id: scraper
    description: |
      Use web search to find:
      - 2 lowest current "Buy It Now" prices for {product}
      - 2 recent "sold" prices (or closest equivalent)
      Include source links when possible. Be brief.
    expected_output: "Bullet list of prices with sources; separate live vs sold comps."

  - id: compute_profit
    agent_id: analyst
    description: |
      Using the found sold comps and assuming buy price = {target_price}:
      - Estimate expected sale price (use a conservative sold comp)
      - Calculate marketplace fee %, shipping, and net profit
      Return the full breakdown (numbers) and the breakeven sale price.

      Optional context (if helpful): call `sales_csv_summary` on `{sample_sales_csv}` and/or
      `flip_csv_summary` on `{sample_flips_csv}` once each at most — use JSON to ground fee
      assumptions or recent sell-through; do not replace web comps with CSV alone.
    expected_output: "A clear profit breakdown with assumptions and breakeven."

  - id: make_decision
    agent_id: decider
    description: |
      Decide BUY or PASS for {product} at {target_price}, based on the profit breakdown and comps.
      You MUST apply these hard rules:
      - If net_profit < {min_profit}, output PASS
      - If roi_percent < {min_roi_percent}, output PASS
      - Otherwise output BUY (unless comps clearly imply scams/counterfeits/unrealistic pricing)

      Output must include:
      - BUY or PASS (first line)
      - 2-4 bullet reasons
      - The key numbers (expected sale, fees, shipping, net profit, ROI)
    expected_output: 'A "BUY" or "PASS" recommendation with a clear profit breakdown.'
    output_file: "outputs/arbitrage_report.md"
